# SleepSync backend configuration — constraint defaults for the optimizer.

risk:
  # Cold-start: nightsAvailable below this triggers conservative prior.
  cold_start_threshold: 3
  # Population prior centered around early-morning wake-maintenance band.
  prior_peak_t: 0.65
  prior_peak_width: 0.12
  prior_baseline: 0.10
  prior_peak_height: 0.55

optimizer:
  dose_max: 1.0
  dose_min: 0.0
  # Per-interval cap on |Δdose| (rate limiter); used as a soft check in tests.
  max_dose_per_interval: 0.15
  # Earliest allowed ramp-out from the delayed phase.
  min_delay_t: 0.10
  # Latest allowed start of the taper phase.
  taper_start_t_max: 0.85
  # Smoothness penalty weight in objective.
  smoothness_lambda: 0.20
  # Dose at t=1 must be exactly 0.
  taper_to_zero_at_wake: true

versions:
  risk_model: "heuristic-v0"
  optimizer: "opt-0.1.0"

# Expo web + local dev (native iOS/Android ignores CORS).
cors:
  allow_origin_regex: "https?://(localhost|127\\.0\\.0\\.1|192\\.168\\.\\d{1,3}\\.\\d{1,3})(:\\d+)?|https://([a-z0-9-]+\\.)*vercel\\.app"
  # Set true only if you need any origin (e.g. odd tunnel URLs); disables credentials.
  allow_all: false

# Google Health API — non-secret settings (secrets in .env).
# Secrets come from env: GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET,
# GOOGLE_HEALTH_REDIRECT_URI, TOKEN_ENCRYPTION_KEY. See docs/GOOGLE_HEALTH.md.
google_health:
  authorize_url: "https://accounts.google.com/o/oauth2/v2/auth"
  token_url: "https://oauth2.googleapis.com/token"
  revoke_url: "https://oauth2.googleapis.com/revoke"
  api_base: "https://health.googleapis.com/v4"
  # Register this exact URI on your Google OAuth Web server client (see docs/GOOGLE_HEALTH.md).
  redirect_uri: "http://127.0.0.1:8000/v1/google-health/oauth/callback"
  # Deep link or web URL opened after the backend exchanges the code (Expo scheme).
  app_return_uri: "sleepsync://google-health/callback"
  # Restricted scopes (sleep / heart rate / HRV). Confirm exact strings against
  # the Google Health API docs before production; these are representative.
  scopes:
    - "https://www.googleapis.com/auth/googlehealth.sleep.readonly"
    - "https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements.readonly"
